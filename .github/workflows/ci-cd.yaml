name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # Updated to v4

    - name: Setup Node.js
      uses: actions/setup-node@v4 # Updated to v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install # Changed from npm ci to npm install
      working-directory: ./services/api-service
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 # Updated to v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5 # Updated to v5
      with:
        context: ./services/api-service
        push: false 
        tags: api-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max