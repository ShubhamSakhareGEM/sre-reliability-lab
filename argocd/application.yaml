apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-lab-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/sre-reliability-lab.git'
    targetRevision: HEAD
    path: infrastructure/kubernetes
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: sre
  syncPolicy:
    automated:
      prune: true
      selfHeal: true